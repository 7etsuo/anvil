# Production-ish local stack: Redis (presence) + Anvil Colyseus server
# Usage:
#   cd anvil/packages/net-colyseus
#   docker compose -f deploy/docker-compose.yml up
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Run the Anvil net process on the host with:
  #   REDIS_URL=redis://127.0.0.1:6379 pnpm --filter @anvil/net-colyseus dev:server
  # Or build your own image that runs: node dist/run-dev-server.js
