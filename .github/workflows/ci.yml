name: ci

on:
  push:
    paths:
      - "anvil/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "anvil/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: anvil

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: anvil/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm -r run build
      - run: pnpm lint
      - run: pnpm test
      - name: Recipe count ≥ 15
        run: |
          count=$(node packages/cli/dist/index.js recipe list | wc -l)
          echo "recipes=$count"
          test "$count" -ge 15
      - name: Build hello-empty static
        run: node packages/cli/dist/index.js build examples/hello-empty --out examples/hello-empty/dist
      - name: Build data package (hello-card)
        run: node packages/cli/dist/index.js build examples/hello-card --out examples/hello-card/dist

  examples:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        example:
          - hello-empty
          - hello-card
          - hello-topdown
          - hello-vn
          - hello-shmup
          - hello-fps2
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: anvil/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm -r run build
      - name: validate ${{ matrix.example }}
        run: node packages/cli/dist/index.js validate examples/${{ matrix.example }}
      - name: test ${{ matrix.example }}
        run: node packages/cli/dist/index.js test examples/${{ matrix.example }}
