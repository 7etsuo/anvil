# Terminate TLS here; Node speaks plain WS on 127.0.0.1:2567
# Set on Node: ANVIL_TRUST_PROXY=1 ANVIL_PUBLIC_ADDRESS=https://game.example.com

upstream anvil_net {
    server 127.0.0.1:2567;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name game.example.com;

    ssl_certificate     /etc/ssl/certs/game.example.com.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/game.example.com.key;

    location / {
        proxy_pass http://anvil_net;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://anvil_net/health;
    }

    location /metrics {
        proxy_pass http://anvil_net/metrics;
        # Restrict in real deploys:
        # allow 10.0.0.0/8; deny all;
    }
}
